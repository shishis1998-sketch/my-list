<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>日历</title>
<style>
  :root{
    --bg:#fdfcf8;
    --card:#ffffff;
    --pill-bg:#ece6d4;
    --pill-bg-active:#e3dcc6;
    --text:#1a1a1a;
    --text-sec:#999;
    --weekend:#e85d5d;
    --event-bg:#dde7f0;
    --event-text:#2c3e50;
    --event-hl:#f5d76e;
    --accent:#2B4D3F;
    --border:rgba(26,26,26,.12);
    --shadow:0 1px 3px rgba(0,0,0,0.04);
    --r:10px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    margin:0;
    font-family:"Helvetica Neue","Helvetica","PingFang SC","Hiragino Sans GB",sans-serif;
    background:var(--bg);
    color:var(--text);
    padding-top:env(safe-area-inset-top);
    -webkit-font-smoothing:antialiased;
  }
  .app{
    max-width:1100px;
    margin:0 auto;
    padding:20px 16px 40px;
  }

  /* 顶栏 */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:8px 4px 28px;
    position:relative;
  }
  .menu-btn,.search-btn,.today-btn{
    background:none;
    border:none;
    cursor:pointer;
    padding:8px;
    color:var(--text);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:inherit;
  }
  .menu-btn svg,.search-btn svg{width:24px;height:24px}
  .today-btn{
    border:1.5px solid var(--text);
    border-radius:6px;
    padding:2px 6px;
    font-size:13px;
    font-weight:600;
    min-width:32px;
  }

  /* 月份标题 —— 2026年5月 一行加粗 */
  .month-pill{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    border:none;
    background:none;
    padding:6px 4px;
    cursor:pointer;
    font-family:"PingFang SC","Hiragino Sans GB",sans-serif;
    color:var(--text);
    font-size:22px;
    font-weight:700;
    letter-spacing:1px;
    transition:opacity .15s;
  }
  .month-pill:active{opacity:.5}

  .top-right,.top-left{display:flex;gap:4px;align-items:center}

  /* 搜索框 */
  .search-bar{
    max-height:0;
    overflow:hidden;
    transition:max-height .25s ease;
    padding:0 4px;
  }
  .search-bar.open{max-height:60px;margin-bottom:14px}
  .search-bar input{
    width:100%;
    padding:10px 14px;
    border:none;
    border-radius:20px;
    background:#f0ede5;
    font-size:15px;
    outline:none;
    color:var(--text);
    font-family:inherit;
  }
  .search-bar input::placeholder{color:var(--text-sec)}

  /* 搜索结果列表 */
  .search-results{
    display:none;
    background:#fff;
    border-radius:12px;
    box-shadow:var(--shadow);
    margin-bottom:16px;
    overflow:hidden;
  }
  .search-results.show{display:block}
  .sr-item{
    padding:12px 16px;
    border-bottom:1px solid #f3f0e8;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    transition:background .15s;
    font-family:"PingFang SC","Hiragino Sans GB",sans-serif;
  }
  .sr-item:last-child{border-bottom:none}
  .sr-item:active{background:#f9f7f0}
  .sr-info{flex:1;min-width:0}
  .sr-title{
    font-size:14px;
    color:var(--text);
    margin-bottom:2px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .sr-meta{
    font-size:12px;
    color:var(--text-sec);
  }
  .sr-date{
    flex:0 0 auto;
    font-size:13px;
    color:var(--accent);
    font-weight:600;
    background:var(--pill-bg);
    padding:4px 10px;
    border-radius:6px;
  }
  .sr-empty{
    padding:20px;
    text-align:center;
    color:var(--text-sec);
    font-size:14px;
    font-family:"PingFang SC","Hiragino Sans GB",sans-serif;
  }

  /* 星期表头 */
  .weekheader{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:4px;
    margin-bottom:6px;
    padding:0 2px;
  }
  .weekheader div{
    text-align:center;
    font-size:13px;
    color:var(--text-sec);
    padding:6px 0;
    letter-spacing:.5px;
    font-family:"PingFang SC","Hiragino Sans GB",sans-serif;
  }
  .weekheader div.we{color:var(--weekend)}

  /* 日历网格 */
  .grid-wrap{
    overflow:hidden;
    position:relative;
    touch-action:pan-y;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
    transition:transform .25s ease,opacity .2s ease;
  }
  .grid.swiping{transition:none}
  .grid.slide-left{transform:translateX(-100%);opacity:0}
  .grid.slide-right{transform:translateX(100%);opacity:0}

  .day{
    background:var(--card);
    border-radius:var(--r);
    min-height:120px;
    padding:8px 6px 6px;
    cursor:pointer;
    box-shadow:var(--shadow);
    transition:transform .1s;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .day:active{transform:scale(.97)}
  .day.other{opacity:.4}
  .day.today .daynum{
    background:var(--text);
    color:#fff;
    border-radius:50%;
    width:26px;
    height:26px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }
  .daynum{
    font-size:15px;
    font-weight:600;
    margin-bottom:4px;
    line-height:26px;
    height:26px;
    display:inline-flex;
    align-items:center;
    letter-spacing:.3px;
  }
  .day.we .daynum{color:var(--weekend)}
  .day.today.we .daynum{color:#fff}

  .events{
    display:flex;
    flex-direction:column;
    gap:3px;
    overflow:hidden;
    flex:1;
  }
  .ev{
    background:var(--event-bg);
    color:var(--event-text);
    font-size:11px;
    padding:3px 6px;
    border-radius:4px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    line-height:1.3;
    font-family:"PingFang SC","Hiragino Sans GB",sans-serif;
  }
  .ev.hl{background:var(--event-hl);font-weight:600}
  .ev-more{font-size:11px;color:var(--text-sec);padding:2px 6px}

  /* 弹窗 —— 蒙层加深，中央弹出 */
  .moverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0);
    display:none;
    z-index:100;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .moverlay.open{
    display:flex;
    animation:fadeIn .18s ease forwards;
  }
  @keyframes fadeIn{to{background:rgba(0,0,0,.55)}}
  .mbox{
    background:#fff;
    border-radius:16px;
    max-width:420px;
    width:100%;
    max-height:80vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    opacity:0;
    transform:scale(.94);
    animation:popIn .2s cubic-bezier(0.34,1.4,0.56,1) forwards;
    box-shadow:0 10px 40px rgba(0,0,0,.2);
  }
  @keyframes popIn{to{opacity:1;transform:scale(1)}}
  .mhdr{
    padding:18px 20px 12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex:0 0 auto;
  }
  .mhdr h3{
    margin:0;
    font-size:18px;
    font-weight:600;
    font-family:"PingFang SC","Hiragino Sans GB",sans-serif;
  }
  .mclose{
    background:none;
    border:none;
    font-size:22px;
    cursor:pointer;
    color:var(--text-sec);
    padding:0 4px;
    line-height:1;
    font-family:inherit;
  }
  .mbody{padding:0 20px 18px;overflow-y:auto;flex:1 1 auto}
  .mev{
    background:var(--event-bg);
    color:var(--event-text);
    padding:10px 12px;
    border-radius:8px;
    margin-bottom:8px;
    font-size:14px;
    font-family:"PingFang SC","Hiragino Sans GB",sans-serif;
  }
  .mev-time{font-size:12px;color:var(--text-sec);margin-top:2px}
  .mev.hl{background:var(--event-hl)}
  .empty{
    color:var(--text-sec);
    text-align:center;
    padding:20px;
    font-family:"PingFang SC","Hiragino Sans GB",sans-serif;
  }

  /* 月份选择器 */
  .month-picker{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    padding:8px 0;
  }
  .mp-item{
    border:none;
    background:var(--pill-bg);
    border-radius:10px;
    padding:18px 0;
    text-align:center;
    cursor:pointer;
    font-family:"PingFang SC","Hiragino Sans GB",sans-serif;
    color:var(--text);
    transition:transform .1s,background .15s;
  }
  .mp-item:active{
    transform:scale(.96);
    background:var(--pill-bg-active);
  }
  .mp-item.current{
    background:var(--text);
    color:#fff;
  }
  .mp-name{font-size:16px;font-weight:600;letter-spacing:1px}

  .year-nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px 10px;
  }
  .year-nav button{
    background:none;
    border:none;
    cursor:pointer;
    padding:6px 10px;
    font-size:20px;
    color:var(--text);
    font-family:inherit;
  }
  .year-nav .year-display{
    font-size:15px;
    font-weight:600;
    letter-spacing:1px;
    color:var(--text-sec);
  }

  /* 手机端 —— 弹窗依然居中（不再贴底） */
  @media (max-width:768px){
    .app{padding:12px 8px 30px}
    .month-pill{padding:6px 4px;font-size:20px}
    .grid{gap:3px}
    .day{
      min-height:110px;
      padding:6px 4px 4px;
      border-radius:8px;
    }
    .daynum{font-size:13px;height:22px;line-height:22px}
    .day.today .daynum{width:22px;height:22px;font-size:12px}
    .ev{font-size:10px;padding:2px 4px}
    .weekheader div{font-size:12px;padding:4px 0}
    .topbar{padding:4px 0 20px}
    /* 居中 + 全宽（留 16 边距） */
    .moverlay{padding:20px 16px}
    .mbox{
      max-width:100%;
      border-radius:16px;
      max-height:75vh;
    }
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="top-left">
      <button class="menu-btn" aria-label="菜单">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>

    <button class="month-pill" id="monthPill">
      <span id="mLabel">2026年5月</span>
    </button>

    <div class="top-right">
      <button class="search-btn" id="searchBtn" aria-label="搜索">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="today-btn" id="todayBtn" aria-label="今天">27</button>
    </div>
  </div>

  <div class="search-bar" id="searchBar">
    <input type="text" id="searchInput" placeholder="搜索事件…">
  </div>

  <div class="search-results" id="searchResults"></div>

  <div class="weekheader">
    <div>一</div><div>二</div><div>三</div><div>四</div><div>五</div>
    <div class="we">六</div><div class="we">日</div>
  </div>

  <div class="grid-wrap" id="gridWrap">
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- 日期详情弹窗 -->
<div class="moverlay" id="dayModal">
  <div class="mbox">
    <div class="mhdr">
      <h3 id="dayModalTitle">五月二十七日</h3>
      <button class="mclose" data-close="day">✕</button>
    </div>
    <div class="mbody" id="dayModalBody"></div>
  </div>
</div>

<!-- 月份选择弹窗 -->
<div class="moverlay" id="pickerModal">
  <div class="mbox">
    <div class="mhdr">
      <h3>选择月份</h3>
      <button class="mclose" data-close="picker">✕</button>
    </div>
    <div class="year-nav">
      <button id="yearPrev">‹</button>
      <span class="year-display" id="yearDisplay">2026</span>
      <button id="yearNext">›</button>
    </div>
    <div class="mbody">
      <div class="month-picker" id="monthPicker"></div>
    </div>
  </div>
</div>

<script>
// ====== 配置：填入你的 Google Calendar 信息 ======
const API_KEY = 'AIzaSyDCZIkUuQuckh-TYsw3UoW8jWlDeM3BCDo';
const CALENDAR_ID = '7bb9faa3a1a0ebaa9a9935054866fa41c3b52f6123242bc3cbf42c68be38ea88@group.calendar.google.com';
const TIME_ZONE = 'Europe/Madrid';
// =================================================

const MONTH_NAMES_CN = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12二月'];

// 事件缓存：key = "YYYY-MM"，value = events 数组
const eventCache = {};
let events = [];  // 当前视图的事件
let allEvents = [];  // 所有已加载的事件（用于搜索）

async function loadMonth(year, month){
  const key = year+'-'+String(month+1).padStart(2,'0');
  if(eventCache[key]) return eventCache[key];

  // 取前后各一个月，避免跨月事件遗漏
  const timeMin = new Date(year, month-1, 1).toISOString();
  const timeMax = new Date(year, month+2, 0, 23, 59, 59).toISOString();

  const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events`
    + `?key=${API_KEY}`
    + `&timeMin=${encodeURIComponent(timeMin)}`
    + `&timeMax=${encodeURIComponent(timeMax)}`
    + `&singleEvents=true`
    + `&orderBy=startTime`
    + `&maxResults=500`
    + `&timeZone=${encodeURIComponent(TIME_ZONE)}`;

  try{
    const res = await fetch(url);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    const parsed = (data.items||[]).map(item=>{
      const startDt = item.start.dateTime || item.start.date;
      // 提取日期部分 YYYY-MM-DD
      const date = startDt.substring(0,10);
      // 提取时间（如果有）
      let time = '';
      if(item.start.dateTime){
        const d = new Date(item.start.dateTime);
        time = String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
      }
      return {
        date,
        title: item.summary || '(无标题)',
        time,
        location: item.location || '',
        description: item.description || ''
      };
    });
    eventCache[key] = parsed;
    // 合并到 allEvents（去重）
    parsed.forEach(e=>{
      if(!allEvents.find(x=>x.date===e.date && x.title===e.title && x.time===e.time)){
        allEvents.push(e);
      }
    });
    return parsed;
  }catch(err){
    console.error('加载日历失败:', err);
    return [];
  }
}

const today = new Date();
let viewYear = today.getFullYear();
let viewMonth = today.getMonth();
let pickerYear = viewYear;
let searchKeyword = '';

const grid = document.getElementById('grid');
const gridWrap = document.getElementById('gridWrap');
const mLabel = document.getElementById('mLabel');
const todayBtn = document.getElementById('todayBtn');
const searchBtn = document.getElementById('searchBtn');
const searchBar = document.getElementById('searchBar');
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
const dayModal = document.getElementById('dayModal');
const dayModalTitle = document.getElementById('dayModalTitle');
const dayModalBody = document.getElementById('dayModalBody');
const monthPill = document.getElementById('monthPill');
const pickerModal = document.getElementById('pickerModal');
const monthPicker = document.getElementById('monthPicker');
const yearDisplay = document.getElementById('yearDisplay');

function fmt(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')}
function isToday(y,m,d){return y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate()}
function eventsOn(s){return events.filter(e=>e.date===s)}
function matchSearch(ev){return searchKeyword && ev.title.toLowerCase().includes(searchKeyword.toLowerCase())}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

async function render(){
  mLabel.textContent = viewYear+'年'+(viewMonth+1)+'月';
  todayBtn.textContent = today.getDate();

  // 异步加载当前月份事件
  events = await loadMonth(viewYear, viewMonth);

  grid.innerHTML='';

  let startWeek = new Date(viewYear,viewMonth,1).getDay();
  startWeek = startWeek===0?6:startWeek-1;
  const lastDate = new Date(viewYear,viewMonth+1,0).getDate();
  const prevLastDate = new Date(viewYear,viewMonth,0).getDate();

  const cells=[];
  for(let i=startWeek-1;i>=0;i--) cells.push({d:prevLastDate-i,m:viewMonth-1,y:viewYear,other:true});
  for(let i=1;i<=lastDate;i++) cells.push({d:i,m:viewMonth,y:viewYear,other:false});
  const remain = (7 - cells.length%7)%7;
  for(let i=1;i<=remain;i++) cells.push({d:i,m:viewMonth+1,y:viewYear,other:true});

  cells.forEach(c=>{
    let y=c.y,m=c.m;
    if(m<0){m=11;y--}
    if(m>11){m=0;y++}
    const ds = fmt(y,m,c.d);
    const dow = new Date(y,m,c.d).getDay();
    const isWe = dow===0||dow===6;
    const evs = eventsOn(ds);

    const el = document.createElement('div');
    el.className = 'day'+(c.other?' other':'')+(isToday(y,m,c.d)?' today':'')+(isWe?' we':'');

    let evHtml = '';
    const show = Math.min(evs.length,3);
    for(let i=0;i<show;i++){
      const hl = matchSearch(evs[i]);
      evHtml += `<div class="ev${hl?' hl':''}">${escapeHtml(evs[i].title)}</div>`;
    }
    if(evs.length>3) evHtml += `<div class="ev-more">+${evs.length-3}</div>`;

    el.innerHTML = `<div class="daynum">${c.d}</div><div class="events">${evHtml}</div>`;
    el.addEventListener('click',()=>openDay(ds,y,m,c.d));
    grid.appendChild(el);
  });
}

function openDay(ds,y,m,d){
  dayModalTitle.textContent = (m+1)+'月'+d+'日';
  const evs = allEvents.filter(e=>e.date===ds);
  dayModalBody.innerHTML = evs.length===0
    ? '<div class="empty">这一天没有事件</div>'
    : evs.map(e=>{
        const hl = matchSearch(e);
        let extra = '';
        if(e.time) extra += `<div class="mev-time">${e.time}</div>`;
        if(e.location) extra += `<div class="mev-time">📍 ${escapeHtml(e.location)}</div>`;
        return `<div class="mev${hl?' hl':''}">${escapeHtml(e.title)}${extra}</div>`;
      }).join('');
  dayModal.classList.add('open');
  document.body.style.overflow='hidden';
}

async function gotoMonth(newY,newM,direction){
  if(direction){
    grid.classList.add(direction==='next'?'slide-left':'slide-right');
    setTimeout(async ()=>{
      viewYear=newY; viewMonth=newM;
      grid.classList.add('swiping');
      grid.classList.remove('slide-left','slide-right');
      grid.style.transform = direction==='next'?'translateX(100%)':'translateX(-100%)';
      grid.style.opacity = '0';
      await render();
      grid.offsetHeight;
      grid.classList.remove('swiping');
      grid.style.transform='';
      grid.style.opacity='';
    },250);
  }else{
    viewYear=newY; viewMonth=newM;
    await render();
  }
}
function nextMonth(){let m=viewMonth+1,y=viewYear;if(m>11){m=0;y++}gotoMonth(y,m,'next')}
function prevMonth(){let m=viewMonth-1,y=viewYear;if(m<0){m=11;y--}gotoMonth(y,m,'prev')}

document.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click',closeAll));
[dayModal,pickerModal].forEach(m=>m.addEventListener('click',e=>{if(e.target===m)closeAll()}));
function closeAll(){
  dayModal.classList.remove('open');
  pickerModal.classList.remove('open');
  document.body.style.overflow='';
}

todayBtn.addEventListener('click',()=>{
  viewYear=today.getFullYear(); viewMonth=today.getMonth(); render();
});

searchBtn.addEventListener('click',()=>{
  searchBar.classList.toggle('open');
  if(searchBar.classList.contains('open')){
    setTimeout(()=>searchInput.focus(),100);
  }else{
    searchInput.value=''; searchKeyword=''; renderSearchResults(); render();
  }
});
searchInput.addEventListener('input',e=>{
  searchKeyword = e.target.value.trim();
  renderSearchResults();
  render();
});

function renderSearchResults(){
  if(!searchKeyword){
    searchResults.classList.remove('show');
    searchResults.innerHTML='';
    return;
  }
  const kw = searchKeyword.toLowerCase();
  const matched = allEvents
    .filter(e=>e.title.toLowerCase().includes(kw))
    .sort((a,b)=>a.date.localeCompare(b.date));

  searchResults.classList.add('show');
  if(matched.length===0){
    searchResults.innerHTML = '<div class="sr-empty">没有找到相关事件</div>';
    return;
  }
  searchResults.innerHTML = matched.map(e=>{
    const [y,m,d] = e.date.split('-').map(Number);
    return `<div class="sr-item" data-date="${e.date}">
      <div class="sr-info">
        <div class="sr-title">${escapeHtml(e.title)}</div>
        <div class="sr-meta">${e.time||''}</div>
      </div>
      <div class="sr-date">${m}月${d}日</div>
    </div>`;
  }).join('');

  searchResults.querySelectorAll('.sr-item').forEach(it=>{
    it.addEventListener('click',()=>{
      const ds = it.dataset.date;
      const [y,m,d] = ds.split('-').map(Number);
      // 跳到对应月份
      if(viewYear!==y || viewMonth!==(m-1)){
        viewYear = y;
        viewMonth = m-1;
        render();
      }
      // 打开当日详情
      openDay(ds, y, m-1, d);
    });
  });
}

monthPill.addEventListener('click',()=>{
  pickerYear = viewYear;
  renderPicker();
  pickerModal.classList.add('open');
  document.body.style.overflow='hidden';
});
document.getElementById('yearPrev').addEventListener('click',()=>{pickerYear--;renderPicker()});
document.getElementById('yearNext').addEventListener('click',()=>{pickerYear++;renderPicker()});
function renderPicker(){
  yearDisplay.textContent = pickerYear;
  monthPicker.innerHTML = '';
  for(let i=0;i<12;i++){
    const btn = document.createElement('button');
    const cur = (pickerYear===viewYear && i===viewMonth);
    btn.className = 'mp-item'+(cur?' current':'');
    btn.innerHTML = `<div class="mp-name">${MONTH_NAMES_CN[i]}</div>`;
    btn.addEventListener('click',()=>{
      const dir = (pickerYear>viewYear || (pickerYear===viewYear && i>viewMonth))?'next':
                  (pickerYear<viewYear || (pickerYear===viewYear && i<viewMonth))?'prev':null;
      closeAll();
      gotoMonth(pickerYear,i,dir);
    });
    monthPicker.appendChild(btn);
  }
}

// 左右滑动
let tsx=0,tsy=0,swiping=false;
gridWrap.addEventListener('touchstart',e=>{
  tsx=e.touches[0].clientX; tsy=e.touches[0].clientY; swiping=false;
},{passive:true});
gridWrap.addEventListener('touchmove',e=>{
  if(swiping) return;
  const dx=e.touches[0].clientX-tsx, dy=e.touches[0].clientY-tsy;
  if(Math.abs(dx)>30 && Math.abs(dx)>Math.abs(dy)*1.5) swiping=true;
},{passive:true});
gridWrap.addEventListener('touchend',e=>{
  if(!swiping) return;
  const dx = e.changedTouches[0].clientX - tsx;
  if(dx<-50) nextMonth();
  else if(dx>50) prevMonth();
});

render();
</script>
</body>
</html>
