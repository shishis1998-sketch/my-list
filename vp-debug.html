<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<title>视口诊断</title>
<style>
body{font-family:-apple-system,sans-serif;margin:0;padding:16px;padding-bottom:220px;background:#fff;color:#222;font-size:14px;line-height:1.5;}
h1{font-size:16px;margin:0 0 8px;}
table{border-collapse:collapse;width:100%;margin-bottom:12px;}
td{border:1px solid #ddd;padding:4px 8px;font-family:monospace;font-size:13px;}
td:first-child{font-family:sans-serif;color:#555;width:52%;}
input{width:100%;height:44px;font-size:16px;box-sizing:border-box;padding:0 10px;border:2px solid #2B4D3F;border-radius:6px;}
#log{font-family:monospace;font-size:11px;color:#666;white-space:pre-wrap;margin-top:12px;}
/* 红线 = fixed bottom:0 的位置（行为A浏览器应贴键盘顶） */
#redline{position:fixed;left:0;right:0;bottom:0;height:4px;background:#e33;z-index:99;}
#redline::after{content:"红线 = bottom:0";position:absolute;right:4px;bottom:6px;font-size:11px;color:#e33;background:#fff;padding:0 4px;}
/* 蓝线 = visualViewport 报告的可视区底部（行为B浏览器应贴键盘顶） */
#blueline{position:fixed;left:0;right:0;top:0;height:4px;background:#36c;z-index:99;transform:translateY(-10px);}
#blueline::after{content:"蓝线 = visualViewport 底部";position:absolute;left:4px;bottom:6px;font-size:11px;color:#36c;background:#fff;padding:0 4px;}
</style>
</head>
<body>
<h1>键盘/视口诊断</h1>
<p>点下面的输入框弹出键盘，然后<b>截图</b>（要拍到红线、蓝线和键盘）。</p>
<input id="inp" placeholder="点我弹出键盘...">
<table id="tbl"></table>
<div id="log"></div>
<div id="redline"></div>
<div id="blueline"></div>
<script>
var logEl=document.getElementById('log');
var tbl=document.getElementById('tbl');
var t0=Date.now();
var initH=window.innerHeight;
function row(k,v){return '<tr><td>'+k+'</td><td>'+v+'</td></tr>';}
function refresh(){
  var vv=window.visualViewport;
  var vvB=vv?Math.round(vv.offsetTop+vv.height):-1;
  var html='';
  html+=row('window.innerHeight（布局视口）',window.innerHeight);
  html+=row('innerHeight 初始值',initH);
  html+=row('布局视口缩了多少',initH-window.innerHeight);
  if(vv){
    html+=row('visualViewport.height',Math.round(vv.height));
    html+=row('visualViewport.offsetTop',Math.round(vv.offsetTop));
    html+=row('可视区底部 vvBottom',vvB);
    html+=row('innerHeight − vvBottom（两者分歧）',window.innerHeight-vvB);
    html+=row('vv.scale',vv.scale.toFixed(3));
  }else{
    html+=row('visualViewport','不支持！');
  }
  html+=row('screen.height / availHeight',screen.height+' / '+screen.availHeight);
  html+=row('devicePixelRatio',window.devicePixelRatio);
  tbl.innerHTML=html;
  if(vv){document.getElementById('blueline').style.transform='translateY('+(vvB-4)+'px)';}
}
function log(msg){
  var t=((Date.now()-t0)/1000).toFixed(2);
  logEl.textContent='['+t+'s] '+msg+' inH='+window.innerHeight+(window.visualViewport?' vvH='+Math.round(window.visualViewport.height)+' vvTop='+Math.round(window.visualViewport.offsetTop):'')+'\n'+logEl.textContent;
  if(logEl.textContent.length>3000)logEl.textContent=logEl.textContent.slice(0,3000);
  refresh();
}
window.addEventListener('resize',function(){log('window.resize');});
if(window.visualViewport){
  visualViewport.addEventListener('resize',function(){log('vv.resize');});
  visualViewport.addEventListener('scroll',function(){log('vv.scroll');});
}
document.getElementById('inp').addEventListener('focus',function(){log('input focus');setTimeout(function(){log('focus+0.5s');},500);setTimeout(function(){log('focus+1s');},1000);});
document.getElementById('inp').addEventListener('blur',function(){log('input blur');});
logEl.textContent='UA: '+navigator.userAgent;
refresh();
</script>
</body>
</html>
